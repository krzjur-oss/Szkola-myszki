<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szkoła Myszki 🖱️</title>
<meta name="description" content="Nauka obsługi myszy i touchpada – ćwiczenia dla uczniów">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Szkoła Myszki">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0f1923;
  --panel:  #1a2635;
  --card:   #1e2f42;
  --accent: #00d4ff;
  --green:  #00e676;
  --yellow: #ffd740;
  --orange: #ff6d00;
  --red:    #ff1744;
  --purple: #d500f9;
  --pink:   #ff4081;
  --text:   #e8f4f8;
  --muted:  #7a9bb5;
  --border: #2a3f55;
  --radius: 16px;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
}
#app { width: 100vw; height: 100vh; overflow: hidden; }

/* ── Screens ─────────────────────────────────────────────── */
.screen {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center;
  overflow-y: auto;
  padding: 20px;
}

/* ── Menu ────────────────────────────────────────────────── */
.menu-screen {
  background: radial-gradient(ellipse at 20% 20%, #0d2a4a 0%, #0f1923 60%);
  gap: 20px;
}
.logo h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: var(--accent);
  text-shadow: 0 0 30px rgba(0,212,255,.6);
  text-align: center;
}
.logo p { color: var(--muted); font-size: .95rem; text-align: center; margin-top: 4px; font-weight: 600; }

.stats-bar {
  display: flex; gap: 16px; flex-wrap: wrap;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 20px;
  width: 100%; max-width: 720px;
}
.stat-item { text-align: center; flex: 1; min-width: 70px; }
.stat-value { font-family: 'Fredoka One', cursive; font-size: 1.5rem; }
.stat-label { font-size: .68rem; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

.categories {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px; width: 100%; max-width: 720px;
}
.category-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  cursor: pointer; transition: all .2s;
  position: relative; overflow: hidden;
}
.category-card::before {
  content:''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--cat-color);
}
.category-card:hover { border-color: var(--cat-color); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,.3); }
.cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.cat-icon   { font-size: 2rem; }
.cat-title  { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--cat-color); }
.cat-total-stars { font-size: .8rem; letter-spacing: 2px; }
.cat-desc   { font-size: .82rem; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
.cat-levels { display: flex; gap: 6px; flex-wrap: wrap; }
.level-badge {
  font-size: .68rem; font-weight: 800; padding: 3px 10px;
  border-radius: 20px; background: rgba(255,255,255,.07); color: var(--muted);
}
.level-badge.done { background: var(--cat-color); color: #000; }

/* ── Level Select ────────────────────────────────────────── */
.level-screen { gap: 24px; padding: 24px; }
.level-header {
  display: flex; align-items: center; gap: 16px;
  width: 100%; max-width: 700px;
}
.level-game-title {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Fredoka One', cursive; font-size: 1.5rem;
}
.level-desc {
  color: var(--muted); font-size: .95rem; font-weight: 600;
  max-width: 700px; text-align: center;
}
.level-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px; width: 100%; max-width: 700px;
}
.level-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 22px 18px;
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; text-align: center; position: relative; overflow: hidden;
  transition: border-color .2s, transform .2s;
}
.level-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background: var(--lv-color);
}
.level-card:hover { border-color: var(--lv-color); transform: translateY(-2px); }
.lv-num   { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--lv-color); }
.lv-label { font-family: 'Fredoka One', cursive; font-size: 1.2rem; }
.lv-desc  { font-size: .8rem; color: var(--muted); font-weight: 600; line-height: 1.4; }
.lv-stars { font-size: 1.3rem; letter-spacing: 3px; }
.btn-play {
  width: 100%; padding: 10px; border: none; border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-size: .95rem; font-weight: 800;
  cursor: pointer; color: #000; transition: opacity .15s, transform .15s;
}
.btn-play:hover { opacity: .85; transform: scale(1.03); }

/* ── Game Shell ──────────────────────────────────────────── */
.game-screen { padding: 0; overflow: hidden; }
.game-header {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; width: 100%;
}
.game-info { flex: 1; min-width: 0; }
.game-title { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--accent); }
.game-instruction { font-size: .75rem; color: var(--muted); font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.game-hud { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
.hud-item { text-align: center; }
.hud-val  { font-family: 'Fredoka One', cursive; font-size: 1.2rem; }
.hud-lbl  { font-size: .6rem; color: var(--muted); font-weight: 800; text-transform: uppercase; }

.progress-bar-wrap { height: 4px; background: var(--border); flex-shrink: 0; width: 100%; }
.progress-bar-fill { height: 100%; transition: width .3s, background .5s; }

.game-area {
  flex: 1; position: relative; overflow: hidden;
  cursor: crosshair; touch-action: none;
  background: radial-gradient(ellipse at center, #152333 0%, #0f1923 100%);
}

/* ── Result ──────────────────────────────────────────────── */
.result-screen {
  justify-content: center;
  background: radial-gradient(ellipse at center, #0d2a4a 0%, #0f1923 70%);
}
.result-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 24px; padding: 36px; text-align: center;
  max-width: 420px; width: 100%;
}
.result-emoji { font-size: 4.5rem; margin-bottom: 8px; }
.result-title { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--accent); }
.result-sub   { color: var(--muted); font-weight: 600; margin: 6px 0 20px; }
.result-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px;
}
.result-stat     { background: var(--panel); border-radius: 12px; padding: 12px; }
.result-stat-val { font-family: 'Fredoka One', cursive; font-size: 1.7rem; }
.result-stat-lbl { font-size: .68rem; color: var(--muted); font-weight: 800; text-transform: uppercase; }
.result-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

/* ── Tutorial ────────────────────────────────────────────── */
.tutorial-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.85); z-index: 1000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.tutorial-box {
  background: var(--card); border: 2px solid var(--accent);
  border-radius: 20px; padding: 30px;
  max-width: 400px; width: 100%; text-align: center;
  box-shadow: 0 0 60px rgba(0,212,255,.2);
}
.tutorial-icon { font-size: 3.5rem; margin-bottom: 12px; }
.tutorial-box h2 { font-family:'Fredoka One',cursive; font-size:1.6rem; color:var(--accent); margin-bottom:10px; }
.tutorial-box ul { text-align:left; padding-left:20px; line-height:2; font-weight:600; color:var(--text); margin:12px 0; }

/* ── Shared Buttons ──────────────────────────────────────── */
.btn {
  padding: 10px 22px; border-radius: 10px; border: none;
  font-family: 'Nunito', sans-serif; font-size: .95rem; font-weight: 800;
  cursor: pointer; transition: all .15s;
}
.btn-primary  { background: var(--accent); color: #000; }
.btn-primary:hover  { background: #00b8e0; transform: translateY(-2px); }
.btn-secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.back-btn {
  background: none; border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 8px; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .82rem;
  transition: all .15s; flex-shrink: 0;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Stars ───────────────────────────────────────────────── */
.star        { font-size: 1rem; }
.star.large  { font-size: 1.8rem; }
.star.empty  { opacity: .3; }
.stars.large { display:block; margin-bottom:12px; letter-spacing:4px; }

/* ── Game elements ───────────────────────────────────────── */
.target {
  position: absolute; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform .1s; user-select: none;
  animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
}
.target:hover { transform: scale(1.1); }
.target.shrinking { animation: shrink .15s forwards; }
.target-star     { border-radius: 0 !important; clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }
.target-square   { border-radius: 6px !important; }
.target-triangle { border-radius: 0 !important; clip-path: polygon(50% 0%,0% 100%,100% 100%); }

@keyframes popIn  { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes shrink { to{transform:scale(0);opacity:0} }

.hit-effect {
  position: absolute; border-radius: 50%; pointer-events: none;
  animation: explode .5s forwards; z-index: 50;
  transform: translate(-50%,-50%);
}
.score-pop {
  position: absolute; font-family: 'Fredoka One', cursive; font-size: 1.3rem;
  pointer-events: none; z-index: 60;
  animation: floatUp .8s forwards;
  transform: translate(-50%,-50%);
}
@keyframes explode  { 0%{transform:translate(-50%,-50%) scale(.3);opacity:1} 100%{transform:translate(-50%,-50%) scale(2.5);opacity:0} }
@keyframes floatUp  { 0%{opacity:1;transform:translate(-50%,-50%)} 100%{opacity:0;transform:translate(-50%,calc(-50% - 60px))} }

.drag-item {
  position: absolute; width: 70px; height: 70px;
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 2rem; cursor: grab; user-select: none;
  border: 3px solid rgba(255,255,255,.2); transition: box-shadow .2s;
}
.drag-item:active  { cursor: grabbing; }
.drag-item.dragging { opacity: .7; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,.5); }
.drag-item.matched  { opacity: 0; pointer-events: none; transition: opacity .3s; }
.drop-zone {
  position: absolute; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  border: 3px dashed rgba(255,255,255,.2); transition: all .2s; pointer-events: none;
}
.drop-zone.highlight { border-color: var(--green); background: rgba(0,230,118,.08); }
.drop-zone.done      { background: rgba(0,230,118,.15); border-style: solid; border-color: var(--green); }

/* ── Cursor trail ────────────────────────────────────────── */
.trail-dot {
  position: fixed; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); pointer-events: none;
  transform: translate(-50%,-50%);
  animation: trailFade .4s forwards;
}
@keyframes trailFade { to{opacity:0;transform:translate(-50%,-50%) scale(0)} }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { loadState }             from './core/state.js';
import { route, initRouter, navigate } from './core/router.js';
import { showMenu, showLevelSelect, showGameShell, GAMES } from './core/ui.js';
import { unwatchResize, stopSession } from './core/engine.js';

// ── Cursor trail ──────────────────────────────────────────
document.addEventListener('mousemove', (e) => {
  if (e.sourceCapabilities?.firesTouchEvents) return;
  const dot = document.createElement('div');
  dot.className = 'trail-dot';
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
  document.body.appendChild(dot);
  setTimeout(() => dot.remove(), 400);
});

// ── Dynamiczny import modułu gry ──────────────────────────
const GAME_MODULES = {
  'click-basic':  () => import('./games/click-basic.js'),
  'precision':    () => import('./games/precision.js'),
  'double-click': () => import('./games/double-click.js'),
  'drag':         () => import('./games/drag.js'),
  'maze':         () => import('./games/maze.js'),
  'mixed':        () => import('./games/mixed.js'),
};

// ── Routes ────────────────────────────────────────────────
route('menu', () => {
  _cleanup();
  showMenu();
});

route('level/:gameId', ({ gameId }) => {
  _cleanup();
  if (!GAMES[gameId]) { navigate('menu'); return; }
  showLevelSelect(gameId);
});

route('game/:gameId/:level', async ({ gameId, level }) => {
  _cleanup();
  const lvl = parseInt(level);
  if (!GAMES[gameId] || lvl < 1 || lvl > 3) { navigate('menu'); return; }

  showGameShell(gameId, lvl);

  // Załaduj moduł gry dynamicznie
  const loader = GAME_MODULES[gameId];
  if (!loader) { navigate('menu'); return; }
  try {
    const mod = await loader();
    if (mod.setLevel) mod.setLevel(lvl);  // dla maze.js
    mod.init(lvl);
  } catch (err) {
    console.error('Błąd ładowania gry:', err);
    navigate('menu');
  }
});

// Fallback
route('.*', () => navigate('menu'));

// ── Cleanup między nawigacjami ────────────────────────────
function _cleanup() {
  stopSession();
  unwatchResize();
  document.removeEventListener('mousemove', _mazeMove);
  document.removeEventListener('touchmove', _mazeTouch);
}
// Dummy refs – maze.js zarządza własnymi listenerami
function _mazeMove() {}
function _mazeTouch() {}

// ── Start ─────────────────────────────────────────────────
loadState();
initRouter();

// ── Service Worker ────────────────────────────────────────
if ('serviceWorker' in navigator
    && location.protocol === 'https:'
    && !location.hostname.includes('claudeusercontent')) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
